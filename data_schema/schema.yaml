# Raw NHANES columns expected by the BP pipeline after ingestion merge.
# Values are pandas-friendly dtype hints.
columns:
  SEQN: float
  RIDAGEYR: float
  RIAGENDR: float
  RIDRETH3: float
  INDFMPIR: float
  DMDEDUC2: float
  RIDEXPRG: float
  BPXOSY1: float
  BPXOSY2: float
  BPXOSY3: float
  BPXODI1: float
  BPXODI2: float
  BPXODI3: float
  BPXOPLS1: float
  BPXOPLS2: float
  BPXOPLS3: float
  BMXBMI: float
  BMXWT: float
  BMXHT: float
  antihypertensiveflag: int
  rxcount: float

  # BPQ_L — blood pressure & cholesterol questionnaire (1=Yes, 2=No, 7/9=Refused/DK)
  BPQ020: float       # ever told had high BP
  BPQ050A: float      # currently taking BP medication
  BPQ080: float       # ever told had high cholesterol

  # CDQ_L — cardiovascular symptoms
  CDQ001: float       # chest pain or discomfort
  CDQ008: float       # severe / 30-min chest pain
  CDQ010: float       # shortness of breath on stairs

  # MCQ_L — diagnosed cardiac conditions
  MCQ160B: float      # heart failure
  MCQ160C: float      # coronary heart disease
  MCQ160D: float      # angina pectoris
  MCQ160E: float      # heart attack
  MCQ160F: float      # stroke

  # DIQ_L — diabetes
  DIQ010: float       # ever told had diabetes

required_for_validation:
  - BPXOSY1
  - BPXOSY2
  - BPXOSY3
  - BPXODI1
  - BPXODI2
  - BPXODI3
  - BPXOPLS1
  - BPXOPLS2
  - BPXOPLS3
  - RIDAGEYR

target:
  name: alerttype
  classes:
    - Hypotensive
    - Normal
    - Hypertensive

alert_tiers:
  # Rule-based tiers evaluated BEFORE the ML model (ordered by severity)
  - tier: CRISIS
    trigger: "sys >= 180 OR dia >= 120, AND acute symptom present"
    action: "Call 911"
  - tier: URGENCY
    trigger: "sys >= 180 OR dia >= 120, no symptoms"
    action: "Call physician within hours"
  - tier: CRITICAL_LOW
    trigger: "sys < 70 OR dia < 40, OR (sys < 90 AND on meds AND dizzy)"
    action: "Sit/lie down, call physician"
  - tier: LOW
    trigger: "sys < 90 OR dia < 60"
    action: "Monitor, rest"
  - tier: HIGH
    trigger: "sys >= 140 OR dia >= 90 (or risk-aware thresholds)"
    action: "Rest 5 min, re-measure, contact physician if persistent"
  - tier: ELEVATED
    trigger: "sys 130-139 OR dia 80-89"
    action: "Monitor, re-measure later"
  - tier: NORMAL
    trigger: "sys 90-129 AND dia 60-79"
    action: "No action"

routing:
  min_readings_for_personalization: 7
  unsupervised_threshold: 15

pattern_flags:
  - flag: MORNING_SURGE
    trigger: "morning max systolic - evening/night mean systolic >= 20 mmHg"
    requires: ">= 1 morning + >= 1 evening/night reading with time_of_day tagged"
  - flag: NON_DIPPER
    trigger: "night mean systolic / day mean systolic > 0.9 (less than 10% nocturnal dip)"
    requires: ">= 1 daytime + >= 1 nighttime reading with time_of_day tagged"
  - flag: ORTHOSTATIC_HYPOTENSION
    trigger: "seated/lying vs standing: systolic drop >= 20 OR diastolic drop >= 10"
    requires: ">= 1 seated/lying + >= 1 standing reading with position tagged"
  - flag: PULSE_PRESSURE_HIGH
    trigger: "systolic - diastolic > 60 mmHg"
  - flag: MED_TIMING_NOTE
    trigger: "hours_since_bp_med <= 2 (peak) or >= 20 (trough)"
    type: "informational (physician context, not an alert)"

pregnancy:
  adjustment: "When is_pregnant=1, HIGH tier fires at 140/90 regardless of risk profile"
  physician_note: "Evaluate for pre-eclampsia. Consider urine protein and liver function."
