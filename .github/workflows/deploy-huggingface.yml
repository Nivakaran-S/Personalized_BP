name: Deploy to HuggingFace Spaces

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to HuggingFace Space (single-commit, no history)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE" ]; then
            echo "Missing required secrets: HF_TOKEN, HF_USERNAME, HF_SPACE."
            exit 1
          fi
          # Drop training outputs and raw NHANES binaries. HF blocks binary files in git, so
          # XPT files are fetched inside the Docker build instead (see Dockerfile).
          rm -rf output Artifacts logs final_model prediction_output
          find data/nhanes -type f \( -iname '*.xpt' -o -iname '*.XPT' \) -delete 2>/dev/null || true
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "Deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git remote add hf "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}"
          git push hf hf-deploy:main --force
