name: CI

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'README.md'
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Install and smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import smoke test
        run: |
          python -c "from src.pipeline.training_pipeline import TrainingPipeline; from app import app; print('imports ok')"

      - name: Run pytest if tests exist
        run: |
          if [ -d tests ]; then pip install pytest && pytest -q; else echo "No tests directory; skipping."; fi
