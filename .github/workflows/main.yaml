name: CI

on:
  push:
    branches: [main, master]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Import + rule-engine smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import smoke test
        run: python -c "from app import app; from src.alert_engine import evaluate; print('ok')"

      - name: Rule-engine unit tests
        run: |
          if [ -d tests ]; then pip install pytest && pytest -q; else echo "no tests/ dir"; fi
